<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RaceID Organizers - Shiva Chavoshian</title>
  <link rel="icon" href="../img/shared/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../css/modern.css">
  <link href="https://unpkg.com/ionicons@4.5.10-0/dist/css/ionicons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #ffffff !important;
      color: #333333 !important;
    }

    .case-study-header {
      padding: 1.5rem 0;
      background: var(--bg-color);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 500;
      color: #666666;
      transition: color 0.3s ease;
    }

    .back-link:hover {
      color: var(--accent-primary);
    }

    .logo-dark {
      color: var(--text-primary) !important;
    }

    .btn-outline-dark {
      background: transparent;
      border: 1px solid #cccccc;
      border-radius: var(--radius-full);
      color: #333333;
    }

    .btn-outline-dark:hover {
      border-color: #333333;
      background: rgba(0,0,0,0.05);
      color: #000000;
      box-shadow: none;
    }

    .project-images {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      margin-top: 2rem;
    }

    .gif-container {
      display: grid;
      grid-template-columns: 3fr 1fr;
      gap: 1rem;
      align-items: start;
    }
  </style>

  <!-- Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FGRCPX3DDG"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-FGRCPX3DDG');
  </script>
</head>

<body>

  <nav class="case-study-header">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
      <a href="../index.html" class="logo">Shiva Chavoshian</a>
      <span style="font-weight: 500; color: var(--text-secondary); text-transform: capitalize;">RaceID Organizers</span>
      <a href="../index.html#work" class="back-link">
        <i class="icon ion-md-arrow-back"></i> Back to Work
      </a>
    </div>
  </nav>

  <main>
    <div class="container">
      <div class="project-images">
        <img src="../img/projects/raceid/ux-portfolio-raceid-organizers1.jpg" alt="RaceID Organizers Flow"
          style="width: 100%; border-radius: var(--radius-sm);">

        <div class="gif-container">
          <img src="../img/projects/raceid/ux-portfolio-raceid-organizers-desktop.gif" alt="Desktop Demo"
            style="width: 100%; border-radius: var(--radius-sm); border: 1px solid #333;">
          <img src="../img/projects/raceid/ux-portfolio-raceid-organizers-mobile.gif" alt="Mobile Demo"
            style="width: 100%; border-radius: var(--radius-sm); border: 1px solid #333; margin-top:2rem;">
        </div>

        <img src="../img/projects/raceid/ux-portfolio-raceid-organizers3.jpg" alt="RaceID Features"
          style="width: 100%; border-radius: var(--radius-sm);">
      </div>

      <div style="margin: 4rem 0; text-align: center;">
        <a href="../index.html#projects" class="btn btn-outline btn-outline-dark">See More Projects</a>
      </div>
    </div>
  </main>

  <footer
    style="padding: 2rem 0; text-align: center; border-top: 1px solid rgba(0,0,0,0.1); color: #666666; font-size: 0.9rem;">
    <div class="container">
      &copy; 2026 Shiva Chavoshian. All rights reserved.
    </div>
  </footer>

</body>

</html>
